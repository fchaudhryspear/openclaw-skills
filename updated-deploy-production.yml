name: Deploy to Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      deployment_strategy:
        description: 'Deployment strategy'
        required: true
        default: 'canary'
        type: choice
        options:
          - canary
          - blue-green
          - rolling
      canary_percentage:
        description: 'Canary traffic percentage (for canary strategy)'
        required: false
        default: '10'
        type: string
      skip_approval:
        description: 'Skip manual approval (emergency only)'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: us-east-1
  PRODUCTION_STACK_NAME: real-time-data-lake-production

permissions:
  id-token: write
  contents: read

jobs:
  approve:
    name: Manual Approval
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_approval != 'true'
    environment: production-approval
    
    steps:
      - name: Approval checkpoint
        run: |
          echo "✅ Deployment approved by ${{ github.actor }}"
          echo "Strategy: ${{ github.event.inputs.deployment_strategy }}"
  
  pre-deployment-checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    needs: approve
    if: always() && (needs.approve.result == 'success' || needs.approve.result == 'skipped')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Verify commit is on main
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "❌ Production deployments must be from main branch"
            exit 1
          fi
      
      - name: Run all tests
        uses: fchaudhryspear/real-time-financial-data-lake/.github/workflows/ci.yml@main
        with:
          python_version: '3.11'
          run_integration_tests: 'true'
          run_security_scan: 'false'
        continue-on-error: false
      
      - name: Check staging health
        run: |
          echo "Checking staging environment health..."
      
      - name: Verify security scan results
        run: |
          echo "Verifying no critical security findings..."
  
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    environment:
      name: production
      url: https://api.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PRODUCTION_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Build SAM application
        run: sam build --template-file template.yaml
      
      - name: Deploy Canary (if canary strategy)
        if: github.event.inputs.deployment_strategy == 'canary' || github.event.inputs.deployment_strategy == ''
        run: |
          canary_percent=${{ github.event.inputs.canary_percentage || 10 }}
          sam deploy \
            --stack-name ${{ env.PRODUCTION_STACK_NAME }} \
            --s3-bucket ${{ secrets.PRODUCTION_S3_BUCKET }} \
            --s3-prefix ${{ env.PRODUCTION_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
              Environment=production \
              LogLevel=INFO \
              EnableRLS=true \
              CanaryPercentage=$canary_percent \
            --no-fail-on-empty-changeset
      
      - name: Deploy Blue-Green (if blue-green strategy)
        if: github.event.inputs.deployment_strategy == 'blue-green'
        run: |
          # Deploy to "green" stack
          sam deploy \
            --stack-name ${{ env.PRODUCTION_STACK_NAME }}-green \
            --s3-bucket ${{ secrets.PRODUCTION_S3_BUCKET }} \
            --s3-prefix ${{ env.PRODUCTION_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
              Environment=production \
              LogLevel=INFO \
              EnableRLS=true \
            --no-fail-on-empty-changeset
          
          # Run smoke tests on green
          # Swap traffic if successful
      
      - name: Deploy Rolling (if rolling strategy)
        if: github.event.inputs.deployment_strategy == 'rolling'
        run: |
          sam deploy \
            --stack-name ${{ env.PRODUCTION_STACK_NAME }} \
            --s3-bucket ${{ secrets.PRODUCTION_S3_BUCKET }} \
            --s3-prefix ${{ env.PRODUCTION_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
              Environment=production \
              LogLevel=INFO \
              EnableRLS=true \
            --no-fail-on-empty-changeset
  
  canary-monitoring:
    name: Canary Monitoring
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event.inputs.deployment_strategy == 'canary' || github.event.inputs.deployment_strategy == ''
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PRODUCTION_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Monitor canary metrics
        run: |
          echo "Monitoring canary deployment for 10 minutes..."
          for i in {1..10}; do
            echo "Check $i/10"
            error_rate=$(aws cloudwatch get-metric-statistics ... )  # Truncated for brevity
            if [[ "$error_rate" != "None" && $(echo "$error_rate > 0.01" | bc -l) -eq 1 ]]; then
              echo "❌ Error rate too high: $error_rate"
              exit 1
            fi
            sleep 60
          done
          echo "✅ Canary metrics look good"
  
  promote-canary:
    name: Promote Canary to Full Traffic
    runs-on: ubuntu-latest
    needs: [deploy, canary-monitoring]
    environment: production-approval
    if: github.event.inputs.deployment_strategy == 'canary' || github.event.inputs.deployment_strategy == ''
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PRODUCTION_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Promote to 100% traffic
        run: |
          sam deploy \
            --stack-name ${{ env.PRODUCTION_STACK_NAME }} \
            --s3-bucket ${{ secrets.PRODUCTION_S3_BUCKET }} \
            --s3-prefix ${{ env.PRODUCTION_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
              Environment=production \
              LogLevel=INFO \
              EnableRLS=true \
              CanaryPercentage=100 \
            --no-fail-on-empty-changeset
          echo "✅ Canary promoted to 100% traffic"
  
  smoke-tests:
    name: Post-Deployment Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PRODUCTION_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Get API endpoint
        id: get-endpoint
        run: |
          api_endpoint=$(aws cloudformation describe-stacks ... )  # Truncated
      
      - name: Run production smoke tests
        run: |
          pip install requests pytest
          python -c "..."  # Truncated
  
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    if: failure()
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CLOUDFORMATION_ROLLBACK_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Rollback to previous version
        run: |
          echo "❌ Deployment failed, initiating rollback..."
          aws cloudformation rollback-stack \
            --stack-name ${{ env.PRODUCTION_STACK_NAME }}
  
  finalize:
    name: Finalize Deployment
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests, promote-canary]
    if: always() && needs.deploy.result == 'success'
    
    steps:
      - name: Create deployment tag
        run: |
          git tag -a "production-$(date +%Y%m%d-%H%M%S)" -m "Production deployment"
          git push origin --tags
      
      - name: Update deployment log
        run: |
          echo "Deployment completed at $(date)" >> deployment-log.txt
      
      - name: Notify success
        run: echo "✅ Production deployment completed successfully!"