AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Credologi Mission Control API v2.3.0

Parameters:
  UserPoolId:
    Type: String
    Default: us-east-1_M6lTgVQaw
    Description: Cognito User Pool ID
  CorsOrigin:
    Type: String
    Default: https://missioncontrol.credologi.com
    Description: Allowed CORS origin

Globals:
  Function:
    Timeout: 60
    MemorySize: 256
    Runtime: nodejs20.x
  Api:
    # API Gateway CORS — handles OPTIONS preflight at the gateway level so browsers
    # can reach the API without needing Lambda to respond to every OPTIONS request.
    Cors:
      AllowOrigin:  !Sub "'${CorsOrigin}'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowMethods: "'OPTIONS,GET,POST'"

Resources:

  # ── DynamoDB: Remediation Jobs ─────────────────────────────────────────────
  RemediationJobsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: mission-control-remediation-jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: MissionControl
        - Key: ManagedBy
          Value: CloudFormation

  # ── Lambda: Monitoring + Remediation ──────────────────────────────────────
  MonitoringFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambdaHandler
      Description: Mission Control API v2.3.0 — monitoring, user management, security alerts, remediation
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          CODEBUILD_PROJECT_NAME: credologi-test-suite
          CORS_ORIGIN: !Ref CorsOrigin
          REMEDIATION_TABLE: !Ref RemediationJobsTable
          AWS_ACCOUNT_ID: !Sub "${AWS::AccountId}"
      Policies:
        - AmazonCognitoPowerUser
        - AmazonSESFullAccess
        - AWSSecurityHubReadOnlyAccess

        # ── SecurityHub — update workflow status ──────────────────────────────
        - Statement:
            - Effect: Allow
              Action:
                - securityhub:BatchUpdateFindings
              Resource: "*"

        # ── Secrets Manager ───────────────────────────────────────────────────
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:snowflake-lambda-key*

        # ── CodeBuild — test runner + CVE patch jobs ──────────────────────────
        - Statement:
            - Effect: Allow
              Action:
                - codebuild:StartBuild
                - codebuild:BatchGetBuilds
              Resource: !Sub arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/credologi-test-suite

        # ── DynamoDB — remediation job tracking ───────────────────────────────
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:CreateTable
                - dynamodb:DescribeTable
                - dynamodb:ListTables
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
              Resource: !GetAtt RemediationJobsTable.Arn

        # ── S3 — bucket hardening (block public access + encryption) ──────────
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutBucketPublicAccessBlock
                - s3:PutEncryptionConfiguration
                - s3:GetBucketPublicAccessBlock
                - s3:GetEncryptionConfiguration
                - s3:ListAllMyBuckets
              Resource: "*"

        # ── SSM — config enforcement automation ───────────────────────────────
        - Statement:
            - Effect: Allow
              Action:
                - ssm:StartAutomationExecution
                - ssm:GetAutomationExecution
                - ssm:DescribeAutomationExecutions
              Resource: "*"

        # ── IAM — read-only for playbook generation ───────────────────────────
        - Statement:
            - Effect: Allow
              Action:
                - iam:GetPolicy
                - iam:GetPolicyVersion
                - iam:ListAttachedRolePolicies
                - iam:ListRolePolicies
                - iam:GetRolePolicy
              Resource: "*"

        # ── Lambda — read-only for CVE resource discovery ─────────────────────
        - Statement:
            - Effect: Allow
              Action:
                - lambda:ListFunctions
                - lambda:GetFunction
                - lambda:ListTags
              Resource: "*"

      Events:
        # ── Public routes — no Cognito token required ──────────────────────────
        Root:
          Type: Api
          Properties:
            Path: /
            Method: GET
        Health:
          Type: Api
          Properties:
            Path: /health
            Method: GET
        Flows:
          Type: Api
          Properties:
            Path: /flows
            Method: GET
        # ── Protected catch-all — requires Cognito ID token ────────────────────
        # Covers: /security-alerts (GET/POST), /users (GET/POST),
        #         /run-tests, /test-status, and all sub-paths.
        ProxyAll:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  # ── Gateway Responses — CORS headers on 401/403 ────────────────────────────
  # API Gateway's Cognito authorizer returns 401/403 WITHOUT CORS headers,
  # causing browsers to throw "Failed to fetch". These overrides add CORS
  # headers to error responses so the frontend can read the actual error.
  GatewayResponseUnauthorized:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref ServerlessRestApi
      ResponseType: UNAUTHORIZED
      StatusCode: '401'
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: !Sub "'${CorsOrigin}'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
      ResponseTemplates:
        application/json: '{"message":"Unauthorized"}'

  GatewayResponseAccessDenied:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref ServerlessRestApi
      ResponseType: ACCESS_DENIED
      StatusCode: '403'
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: !Sub "'${CorsOrigin}'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
      ResponseTemplates:
        application/json: '{"message":"Access denied"}'

Outputs:
  MonitoringApi:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  MonitoringFunction:
    Description: Lambda Function ARN
    Value: !GetAtt MonitoringFunction.Arn
  RemediationTable:
    Description: DynamoDB table for remediation job tracking
    Value: !Ref RemediationJobsTable
